name: Bug report
description: Report a defect with enough detail for maintainers to reproduce it.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, URLs, or files when possible.
      placeholder: |
        1. Go to...
        2. Run...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What breaks for users or maintainers?
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, browser, version, or branch details.
